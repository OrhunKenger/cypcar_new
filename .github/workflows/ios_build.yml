name: iOS Build (Unsigned)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Build iOS (No Codesign)
      run: |
        flutter build ios --release --no-codesign
    - name: Check Build Result
      run: ls -R build/ios/iphoneos
    - name: Create IPA for Sideloadly
      run: |
        rm -rf Payload
        mkdir -p Payload
        cp -RP build/ios/iphoneos/Runner.app Payload/
        zip -ry Cypcar.ipa Payload
        ls -lh Cypcar.ipa
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Cypcar_IPA_File
        path: Cypcar.ipa
